version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite databases and blob storage
      - ./data:/data
      # Load config file from host filesystem
      - ./config:/config
    environment:
      # Configuration file
      - CONFIG_FILE=/config/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
