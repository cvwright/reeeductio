# End-to-end testing configuration with MinIO
#
# This config uses MinIO for S3-compatible blob storage. Use when:
# - Running tests from within Docker (docker-compose exec)
# - Running tests on a machine where 'minio' hostname resolves to MinIO
#
# Note: Presigned URLs contain the hostname in their signature. If you're
# running tests from the host machine while MinIO runs in Docker, the
# hostname mismatch will cause signature verification to fail.
#
# For host-based testing, use config.e2e.yaml (filesystem blob storage).

environment: test
debug: true

server:
  host: "0.0.0.0"
  port: 8000
  jwt_secret: "e2e-test-jwt-secret-do-not-use-in-production"
  jwt_expiry_hours: 1
  challenge_expiry_seconds: 300
  max_message_size: 102400
  max_blob_size: 10485760  # 10 MB for e2e tests

# Use Firestore emulator (FIRESTORE_EMULATOR_HOST env var set in docker-compose)
database:
  type: firestore
  project_id: e2e-test-project
  database_id: "(default)"

# Use MinIO for blob storage
blob_store:
  type: s3
  bucket_name: e2e-test-bucket
  endpoint_url: "http://minio:9000"
  access_key_id: minioadmin
  secret_access_key: minioadmin
  region_name: us-east-1
  presigned_url_expiration: 300

logging:
  level: DEBUG
  format: text
  enable_access_log: true
